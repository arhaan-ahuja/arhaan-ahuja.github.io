name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & build (tariff-to-table)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tariff-to-table/package-lock.json

      - name: Install dependencies
        working-directory: tariff-to-table
        run: npm ci

      - name: Lint
        working-directory: tariff-to-table
        run: npm run lint

      - name: Build
        working-directory: tariff-to-table
        run: npm run build
