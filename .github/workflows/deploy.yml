name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tariff-to-table/package-lock.json

      - name: Build tariff-to-table
        working-directory: tariff-to-table
        run: |
          npm ci
          npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          # Portfolio (repo root) — everything except source/build/tooling dirs
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='tariff-to-table' \
            --exclude='_site' \
            ./ _site/
          # Built React app under /tariff-to-table/
          mkdir -p _site/tariff-to-table
          cp -r tariff-to-table/dist/. _site/tariff-to-table/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
