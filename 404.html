<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found</title>
    <script type="text/javascript">
      // GitHub Pages serves this root 404.html for any unknown path across the
      // whole site. The Tariff to Table app is a single-page app under
      // /tariff-to-table/, so deep links / refreshes there land here. Stash the
      // requested URL and bounce into the app root, which restores the route.
      (function () {
        var path = location.pathname;
        if (path.indexOf('/tariff-to-table/') === 0) {
          sessionStorage.redirect = location.href;
          location.replace('/tariff-to-table/');
        }
      })();
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0a1628;
        color: #f7f5f0;
        text-align: center;
        padding: 2rem;
      }
      h1 { font-size: 3rem; margin: 0 0 0.5rem; }
      p { color: #b8b2a6; margin: 0 0 1.5rem; }
      a { color: #d8846f; text-decoration: none; font-weight: 600; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <h1>404</h1>
    <p>This page could not be found.</p>
    <a href="/">Return home</a>
  </body>
</html>
